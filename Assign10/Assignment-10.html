<!DOCTYPE html>
<html>
<head>
    <title>Student Form</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f2f6ff;
        }

        .box {
            width: 300px;
            margin: 50px auto;
            background: white;
            padding: 15px;
            border: 1px solid #ccc;
        }

        input {
            width: 100%;
            padding: 6px;
            margin: 6px 0;
            border: 1px solid #ccc;
        }

        .btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 8px;
            cursor: pointer;
        }

        .btn:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

<div class="box">

<h2>Student Form</h2>

<form method="POST" action="process.php">
    Name:
    <input type="text" name="name" required>

    Email:
    <input type="email" name="email" required>

    <input type="submit" value="Submit" class="btn">
</form>

</div>

</body>
</html>
