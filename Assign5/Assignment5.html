<!DOCTYPE html>
<html>
<head>
    <title>Bootstrap Responsive Page</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <!-- Heading -->
    <h2 class="text-center mb-4">Student Dashboard CareerFolio</h2>

    <!-- Grid Layout -->
    <div class="row">
        <div class="col-md-4 bg-primary text-white p-3">
            <h4>Profile</h4>
            <p>Name: Harsh</p>
            <p>Branch: Computer</p>
        </div>

        <div class="col-md-4 bg-success text-white p-3">
            <h4>Subjects</h4>
            <ul>
                <li>DBMS</li>
                <li>OS</li>
                <li>CN</li>
            </ul>
        </div>

        <div class="col-md-4 bg-warning p-3">
            <h4>Marks</h4>
            <p>DBMS: 85</p>
            <p>OS: 78</p>
        </div>
    </div>

    <!-- Bootstrap Component (Table) -->
    <h3 class="mt-4">Student List</h3>
    <table class="table table-bordered">
        <tr>
            <th>Name</th>
            <th>Branch</th>
        </tr>
        <tr>
            <td>Harsh</td>
            <td>Computer</td>
        </tr>
        <tr>
            <td>Amit</td>
            <td>IT</td>
        </tr>
    </table>

    <!-- Bootstrap Component (Button) -->
    <button class="btn btn-primary">Submit</button>

</div>

</body>
</html>
