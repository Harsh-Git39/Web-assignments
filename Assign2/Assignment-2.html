<!DOCTYPE html>
<html>
<head>
    <title>Student Information Page</title>

    <style>
        body { font-family: Arial; background: #f4f8ff; }

        h2 { text-align: center; }

        img { display: block; margin: auto; border-radius: 50%; }

        a { display: block; text-align: center; margin: 10px; }

        table { width: 80%; margin: auto; border-collapse: collapse; }

        th, td { border: 1px solid black; padding: 8px; text-align: center; }
    </style>
</head>

<body>

<h2>Student Academic Profile</h2>

<!-- Image -->
<img src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
     width="120" height="120">

<!-- Link -->
<a href="https://github.com" target="_blank">
    Visit My GitHub Profile
</a>

<!-- Table -->
<table>
    <tr>
        <th>Semester</th>
        <th>Subjects & Marks</th>
        <th>Status</th>
    </tr>

    <tr>
        <td>Semester 1</td>

        <td>
            <!-- Nested Table -->
            <table>
                <tr><th>Subject</th><th>Marks</th></tr>
                <tr><td>Math</td><td>85</td></tr>
                <tr><td>Programming</td><td>90</td></tr>
                <tr><td>Physics</td><td>80</td></tr>
            </table>
        </td>

        <td>Pass</td>
    </tr>
</table>

</body>
</html>
